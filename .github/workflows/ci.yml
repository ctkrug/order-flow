name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  engine:
    name: Rust engine (fmt, clippy, test)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: engine
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy
      - name: cargo fmt --check
        run: cargo fmt --check
      - name: cargo clippy
        run: cargo clippy --all-targets -- -D warnings
      - name: cargo test
        run: cargo test

  engine-wasm:
    name: Rust engine (wasm32 build)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: engine
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: wasm32-unknown-unknown
      - name: cargo build --target wasm32-unknown-unknown
        run: cargo build --release --target wasm32-unknown-unknown

  site:
    name: Site (build)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: wasm32-unknown-unknown
      - name: install wasm-bindgen-cli matching the engine's pinned version
        run: cargo install wasm-bindgen-cli --version 0.2.126 --locked
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: site/package-lock.json
      - working-directory: site
        run: npm ci
      - working-directory: site
        run: npx playwright install --with-deps firefox
      - working-directory: site
        run: npm run test:coverage
      - working-directory: site
        run: npm run test:e2e
      - working-directory: site
        run: npm run build
